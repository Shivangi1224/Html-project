<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us- LTS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1> Contact Us - The Little Taco shop</h1>
        <nav>
            <ul>
                <li>
                    <a href="index.html">Home</a>
                </li>
                <li>
                    <a href="#about">About <abbr title="The Little Taco Shop">LTS</abbr></a>
                </li>
                <li>
                    <a href="#menu">Menu</a>
                </li>
                <li>
                    <a href="hours.html" target="_blank">Store Hours</a>
                </li>
            </ul>
        </nav>
        <figure>
            <img src="images/Taco Calling.png" alt="Taco Call" title="Call me I am hungry!" width="400" height="267">
            <figcaption>
                Contact us for more details!
            </figcaption>
        </figure>
    </header>
    <hr>
    <main>
        <section>
            <h2>Our contact Form</h2>
            <form action="https://httpbin.org/get" method="get">
                <fieldset>
                    <legend>Send Us A Message</legend>
                    <p>
                        <label for="name">Name: </label>
                        <input type="text" name="name" id="name" placeholder="your name" required>
                    </p>
                    <p>
                        <label for="email">Email: </label>
                        <input type="text" name="email" id="email" placeholder="your email" required>
                    </p>
                    <p>
                        <label for="message">Your Message:</label>
                        <br>
                        <textarea name="message" id="message" cols="30" rows="10"
                            placeholder="Type your message here!"></textarea>
                    </p>
                </fieldset>
                <button type="submit">Send</button>
                <button type="reset">Reset</button>
            </form>
        </section>
        <section>
            <h2>Our location</h2>
            <address>
                555 Taco Temptation lane, Suite <br>
                Kansas City, MO 55555-5555
                <br> <br>
                Phone: <a href="tel: +5555555555">555-555-5555</a>
            </address>
        </section>
    </main>
    <hr>
    <footer>
        <p>
            Copyright &copy; The Little Taco Shop
        </p>
    </footer>
</body>

</html>
